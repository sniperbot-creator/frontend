<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | SniperTool</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #080B14; --bg2: #0D1120; --bg3: #131829;
            --border: rgba(255,255,255,0.07); --text: #F0F4FF;
            --muted: #6B7280; --green: #14F195; --sol: #9945FF;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; padding: 24px;
        }
        body::before {
            content: ''; position: fixed; top: -20%; left: 50%;
            transform: translateX(-50%); width: 900px; height: 600px;
            background: radial-gradient(ellipse, rgba(20,241,149,0.1) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }
        .container {
            position: relative; z-index: 1;
            text-align: center; max-width: 480px; width: 100%;
        }
        .check-circle {
            width: 96px; height: 96px; border-radius: 50%;
            background: rgba(20,241,149,0.1); border: 2px solid var(--green);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 32px;
            animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .check-circle svg { width: 44px; height: 44px; color: var(--green); }
        h1 {
            font-family: 'Syne', sans-serif; font-size: 40px;
            font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em;
        }
        h1 span {
            background: linear-gradient(135deg, #9945FF, #14F195);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--muted); font-size: 16px; line-height: 1.6; margin-bottom: 40px; }
        .summary-card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 20px; padding: 28px; margin-bottom: 32px; text-align: left;
        }
        .summary-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid var(--border);
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-label {
            font-family: 'DM Mono', monospace; font-size: 12px;
            text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
        }
        .summary-value { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
        .summary-value.highlight {
            background: linear-gradient(135deg, #9945FF, #14F195);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700;
        }
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(20,241,149,0.1); border: 1px solid rgba(20,241,149,0.3);
            color: var(--green); border-radius: 20px; padding: 4px 12px;
            font-family: 'DM Mono', monospace; font-size: 12px;
        }
        .status-dot {
            width: 6px; height: 6px; background: var(--green); border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .home-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: linear-gradient(135deg, #9945FF, #6d28d9);
            color: white; text-decoration: none; padding: 16px 36px;
            border-radius: 14px; font-family: 'Syne', sans-serif;
            font-size: 16px; font-weight: 700; transition: all 0.25s;
        }
        .home-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(153,69,255,0.35); }
        .note { margin-top: 24px; font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }
        .session-id { font-size: 11px; color: var(--muted); word-break: break-all; }
    </style>
</head>
<body>
<div class="container">
    <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
    </div>

    <h1>Payment <span>Confirmed!</span></h1>
    <p class="subtitle">Your payment was successful. Your SOL will be delivered soon, and a confirmation email will be sent to you shortly.</p>

    <div class="summary-card">
        <div class="summary-row">
            <span class="summary-label">Status</span>
            <span class="status-badge"><span class="status-dot"></span>Paid</span>
        </div>
        <div class="summary-row">
            <span class="summary-label">Session ID</span>
            <span class="summary-value session-id" id="session-id">—</span>
        </div>
    </div>

    <a href="/" class="home-btn">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
        </svg>
        Back to Home
    </a>
    <p class="note">Need help? Contact support with your Session ID.</p>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    if (sessionId) {
        document.getElementById('session-id').textContent = sessionId;
    }
</script>
</body>
</html>
